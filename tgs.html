<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TGS Converter — µWasm Toolbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .fmt-group {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .fmt-radio { display: none; }
    .fmt-label {
      padding: .45rem 1.1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text-2);
      transition: all var(--transition);
      user-select: none;
    }
    .fmt-radio:checked + .fmt-label {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--accent-h);
    }
    .fmt-label:hover { border-color: var(--text-2); color: var(--text); }
  </style>
</head>
<body>

<nav class="topbar">
  <a class="topbar-back" href="index.html">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
      <path d="M3.828 7H14v2H3.828l3.586 3.586L6 14 0 8l6-6 1.414 1.414L3.828 7z"/>
    </svg>
    Toolbox
  </a>
  <span class="topbar-sep"></span>
  <span class="topbar-title">TGS Converter</span>
</nav>

<!-- Hidden canvas used for Lottie rendering -->
<canvas id="render-canvas" style="position:fixed;left:-9999px;top:-9999px;pointer-events:none" aria-hidden="true"></canvas>

<main class="page">
  <header class="tool-header">
    <div class="tool-header-icon">🎞️</div>
    <div>
      <h1>TGS Converter</h1>
      <p>Convert Telegram animated stickers <code>.tgs</code> to animated GIF or lossless WebP</p>
    </div>
  </header>

  <!-- ── Input tabs ── -->
  <div class="section-label">Input</div>
  <div class="drop-tabs">
    <button class="drop-tab active" id="tab-files"  onclick="switchTab('files')">📄 Files</button>
    <button class="drop-tab"        id="tab-folder" onclick="switchTab('folder')">📁 Folder</button>
  </div>

  <div class="drop-zone" id="dz-files">
    <input type="file" id="input-files" multiple accept=".tgs" />
    <div class="dz-prompt">
      <div class="drop-zone-icon">🎞️</div>
      <div class="drop-zone-label"><strong>Drop .tgs files here</strong> or click to browse</div>
      <div class="drop-zone-hint">Supports multiple files</div>
    </div>
    <div class="dz-list hidden"></div>
  </div>

  <div class="drop-zone hidden" id="dz-folder">
    <input type="file" id="input-folder" webkitdirectory />
    <div class="dz-prompt">
      <div class="drop-zone-icon">📁</div>
      <div class="drop-zone-label"><strong>Drop a folder here</strong> or click to browse</div>
      <div class="drop-zone-hint">All .tgs files inside will be listed</div>
    </div>
    <div class="dz-list hidden"></div>
  </div>

  <hr class="divider" />

  <!-- ── Controls ── -->
  <div class="section-label">Options</div>

  <!-- Output format -->
  <div class="ctrl" style="margin-bottom:1rem">
    <label>Output format <span style="font-size:.75rem;font-weight:400">(–-webp)</span></label>
    <div class="fmt-group" style="margin-top:.4rem">
      <input class="fmt-radio" type="radio" name="fmt" id="fmt-gif"  value="gif"  checked />
      <label class="fmt-label" for="fmt-gif">🖼 GIF</label>
      <input class="fmt-radio" type="radio" name="fmt" id="fmt-webp" value="webp" />
      <label class="fmt-label" for="fmt-webp">✨ WebP (lossless)</label>
    </div>
  </div>

  <div class="controls-grid">
    <div class="ctrl">
      <label for="opt-fps">FPS <span style="font-size:.75rem;font-weight:400">(–-fps, default 15)</span></label>
      <input type="number" id="opt-fps" value="15" min="1" max="60" step="1" />
    </div>
    <div class="ctrl">
      <label for="opt-width">Width px <span style="font-size:.75rem;font-weight:400">(–-width, default 512)</span></label>
      <input type="number" id="opt-width" value="512" min="16" max="2048" step="8" />
    </div>
    <div class="ctrl">
      <label for="opt-height">Height px <span style="font-size:.75rem;font-weight:400">(–-height, default 512)</span></label>
      <input type="number" id="opt-height" value="512" min="16" max="2048" step="8" />
    </div>
    <div class="ctrl">
      <label for="opt-max-frames">Max frames <span style="font-size:.75rem;font-weight:400">(–-max-frames)</span></label>
      <input type="number" id="opt-max-frames" placeholder="unlimited" min="1" max="9999" step="1" />
    </div>
    <div class="ctrl">
      <label for="opt-frames">Frame range <span style="font-size:.75rem;font-weight:400">(–-frames, e.g. 30-90)</span></label>
      <input type="text" id="opt-frames" placeholder="e.g. 30-90" />
    </div>
  </div>

  <!-- ── Action ── -->
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-convert" disabled onclick="convertAll()">▶ Convert</button>
    <button class="btn btn-ghost"   id="btn-clear"   onclick="clearAll()">Clear</button>
    <button class="btn btn-ghost"   id="btn-dl-all"  style="display:none" onclick="downloadAll()">⬇ Download all</button>
  </div>

  <div class="status-bar idle" id="status-bar">○ <span>No files loaded</span></div>
  <div class="results" id="results"></div>
</main>

<script type="module">
import lottie from 'https://esm.sh/lottie-web@5.12.2';
import { initWasm, wasm, readFileBytes, downloadBytes, replaceExt, fmtBytes, setStatus, setupDropZone, showFileList, resetDropZone } from './common.js';

// ── State ─────────────────────────────────────────────────────────
let pendingFiles  = [];
let outputResults = []; // { name, bytes, mime }
let activeZone    = null; // drop zone currently showing a file list
let addMode       = false; // true when the Add button triggered the file picker

// ── Tab switching ─────────────────────────────────────────────────
window.switchTab = function(tab) {
  document.getElementById('tab-files').classList.toggle('active',  tab === 'files');
  document.getElementById('tab-folder').classList.toggle('active', tab === 'folder');
  document.getElementById('dz-files').classList.toggle('hidden',   tab !== 'files');
  document.getElementById('dz-folder').classList.toggle('hidden',  tab !== 'folder');
};

// ── Frame range parsing ───────────────────────────────────────────
function parseRange(s) {
  if (!s || !s.trim()) return null;
  const parts = s.trim().split('-');
  if (parts.length === 1) { const v = parseInt(parts[0]); return [v, v + 1]; }
  if (parts.length === 2) {
    return [parts[0] ? parseInt(parts[0]) : 0, parts[1] ? parseInt(parts[1]) : 999999];
  }
  return null;
}

// ── File ingestion ────────────────────────────────────────────────
function ingestFiles(fileList, zoneEl) {
  const incoming = [...fileList].filter(f => f.name.toLowerCase().endsWith('.tgs'));
  if (!incoming.length) { addMode = false; alert('No .tgs files found in the selection.'); return; }

  let arr;
  if (addMode) {
    // Merge: append files not already present (dedup by name + size)
    addMode = false;
    const seen = new Set(pendingFiles.map(p => p.file.name + ':' + p.file.size));
    const novel = incoming.filter(f => !seen.has(f.name + ':' + f.size));
    if (!novel.length) return;
    arr = [...pendingFiles, ...novel.map(f => ({ file: f, name: f.name }))];
  } else {
    arr = incoming.map(f => ({ file: f, name: f.name }));
  }

  pendingFiles  = arr;
  outputResults = [];
  document.getElementById('results').innerHTML = '';
  document.getElementById('btn-dl-all').style.display = 'none';
  setStatus(document.getElementById('status-bar'), 'idle',
    `${pendingFiles.length} file${pendingFiles.length > 1 ? 's' : ''} ready`);
  document.getElementById('btn-convert').disabled = false;

  if (activeZone && activeZone !== zoneEl) resetDropZone(activeZone);
  activeZone = zoneEl;

  // Files zone gets an Add button; folder zone gets none
  const isFilesZone = zoneEl.id === 'dz-files';
  showFileList(zoneEl, pendingFiles.map(p => p.file), isFilesZone ? {
    onAdd: () => { addMode = true; document.getElementById('input-files').click(); },
  } : {});
}

const dzFiles  = document.getElementById('dz-files');
const dzFolder = document.getElementById('dz-folder');
setupDropZone(dzFiles,  f => ingestFiles(f, dzFiles));
setupDropZone(dzFolder, f => ingestFiles(f, dzFolder));
document.getElementById('input-files').addEventListener('change',  e => ingestFiles(e.target.files, dzFiles));
document.getElementById('input-folder').addEventListener('change', e => ingestFiles(e.target.files, dzFolder));

// ── Lottie frame sampler ──────────────────────────────────────────

/**
 * Render a Lottie animation to a sequence of ImageData frames.
 * Returns { frames: ImageData[], outputFps: number }
 */
async function sampleFrames(lottieJson, opts, progEl) {
  const { fps, width, height, maxFrames, range } = opts;
  const animData = JSON.parse(lottieJson);
  const animFps  = animData.fr || 30;
  const outPoint = animData.op || 60;

  const step      = Math.max(1, Math.round(animFps / fps));
  const outputFps = animFps / step;

  let frameNums = [];
  for (let f = 0; f < outPoint; f += step) frameNums.push(f);

  if (range) {
    const [lo, hi] = range;
    frameNums = frameNums.filter(f => f >= lo && f < hi);
  }
  if (maxFrames && frameNums.length > maxFrames) {
    const s2 = Math.max(1, Math.floor(frameNums.length / maxFrames));
    frameNums = frameNums.filter((_, i) => i % s2 === 0).slice(0, maxFrames);
  }
  if (!frameNums.length) throw new Error('No frames to render (check frame range / max-frames)');

  const canvas = document.getElementById('render-canvas');
  canvas.width  = width;
  canvas.height = height;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });

  const container = document.createElement('div');
  container.style.cssText =
    `position:absolute;left:-9999px;width:${width}px;height:${height}px;overflow:hidden`;
  document.body.appendChild(container);

  const anim = lottie.loadAnimation({
    container,
    renderer: 'canvas',
    loop: false,
    autoplay: false,
    animationData: animData,
    rendererSettings: {
      canvas,
      clearCanvas: true,
      preserveAspectRatio: 'xMidYMid meet',
      progressiveLoad: false,
    },
  });

  await new Promise((resolve, reject) => {
    anim.addEventListener('DOMLoaded', resolve);
    anim.addEventListener('error', reject);
    setTimeout(reject, 5000);
  });

  const frames = [];
  for (let i = 0; i < frameNums.length; i++) {
    anim.goToAndStop(frameNums[i], true);
    await tick();
    frames.push(ctx.getImageData(0, 0, width, height));
    if (progEl) progEl.style.width = Math.round((i + 1) / frameNums.length * 100) + '%';
  }

  anim.destroy();
  container.remove();
  return { frames, outputFps };
}

const tick = () => new Promise(r => setTimeout(r, 0));

// ── GIF encoding (Rust WASM) ──────────────────────────────────────

async function encodeGif(frames, width, height, outputFps) {
  const delayCentisec = Math.max(1, Math.round(100 / outputFps));
  const pixPerFrame   = width * height * 4;
  const flat          = new Uint8Array(frames.length * pixPerFrame);
  frames.forEach((f, i) => flat.set(f.data, i * pixPerFrame));
  return wasm().tgs_encode_gif(flat, width, height, frames.length, delayCentisec);
}

// ── Animated WebP encoding (JS-side, RIFF/ANIM container) ─────────

/**
 * Encode an array of ImageData frames to an animated WebP.
 *
 * Each frame is encoded by the browser's native canvas.toBlob('image/webp')
 * (hardware-accelerated, lossless VP8L with alpha). The resulting VP8L
 * bitstreams are then muxed into a RIFF/WEBP/ANIM container.
 */
async function encodeWebP(frames, width, height, outputFps) {
  const delayMs = Math.max(1, Math.round(1000 / outputFps));

  // Encode every frame as a standalone WebP via a temporary canvas
  const tmpCanvas = document.createElement('canvas');
  tmpCanvas.width  = width;
  tmpCanvas.height = height;
  const tmpCtx = tmpCanvas.getContext('2d');

  const frameWebPs = [];
  for (const imgData of frames) {
    tmpCtx.putImageData(imgData, 0, 0);
    const blob = await new Promise(r => tmpCanvas.toBlob(r, 'image/webp'));
    if (!blob) throw new Error('canvas.toBlob returned null — WebP encoding not supported in this browser');
    frameWebPs.push(new Uint8Array(await blob.arrayBuffer()));
  }

  return muxAnimatedWebP(frameWebPs, width, height, delayMs);
}

/**
 * Mux an array of single-frame WebP files into an animated WebP.
 *
 * The RIFF structure:
 *   RIFF <size> WEBP
 *     VP8X <10 bytes>   — canvas dimensions + animation + alpha flags
 *     ANIM <6 bytes>    — background colour + loop count (0 = ∞)
 *     ANMF <N bytes>    — one per frame: position + duration + VP8/VP8L bitstream
 */
function muxAnimatedWebP(frameWebPs, width, height, delayMs) {
  // ── Low-level RIFF helpers ──────────────────────────────────────

  const enc = new TextEncoder();

  /** Concatenate a list of Uint8Arrays. */
  function concat(parts) {
    const total = parts.reduce((s, p) => s + p.length, 0);
    const out = new Uint8Array(total);
    let off = 0;
    for (const p of parts) { out.set(p, off); off += p.length; }
    return out;
  }

  /** Write a 32-bit unsigned integer LE. */
  function u32(n) {
    const b = new Uint8Array(4);
    new DataView(b.buffer).setUint32(0, n >>> 0, true);
    return b;
  }

  /** Write a 24-bit unsigned integer LE (3 bytes). */
  function u24(n) {
    return new Uint8Array([n & 0xff, (n >> 8) & 0xff, (n >> 16) & 0xff]);
  }

  /**
   * Wrap payload in a RIFF chunk: [tag(4)] [size(4 LE)] [payload] [pad?]
   * Chunk size field is the payload length; if odd, one 0x00 pad byte is appended.
   */
  function riffChunk(tag, payload) {
    const padded = payload.length & 1
      ? concat([payload, new Uint8Array(1)])
      : payload;
    return concat([enc.encode(tag), u32(payload.length), padded]);
  }

  // ── Extract frame bitstream from a single-frame WebP ─────────────
  // ANMF frame data must be: optional ALPH + VP8 or VP8L chunk(s).
  // canvas.toBlob often returns extended WebP (RIFF WEBP VP8X …),
  // so we walk the chunk list and collect only ALPH / VP8 / VP8L,
  // skipping the VP8X wrapper which is invalid inside ANMF.
  function extractFrameData(webpBytes) {
    const sig = String.fromCharCode(...webpBytes.slice(0, 4));
    const fmt = String.fromCharCode(...webpBytes.slice(8, 12));
    if (sig !== 'RIFF' || fmt !== 'WEBP') throw new Error('Invalid WebP from toBlob');

    const view = new DataView(webpBytes.buffer, webpBytes.byteOffset, webpBytes.byteLength);
    const wanted = new Set(['VP8 ', 'VP8L', 'ALPH']);
    const parts = [];
    let offset = 12; // skip RIFF(4) + size(4) + WEBP(4)
    while (offset + 8 <= webpBytes.length) {
      const tag  = String.fromCharCode(...webpBytes.slice(offset, offset + 4));
      const size = view.getUint32(offset + 4, true);
      const padded = size + (size & 1);   // RIFF chunks are word-aligned
      if (wanted.has(tag)) {
        parts.push(webpBytes.slice(offset, offset + 8 + padded));
      }
      offset += 8 + padded;
    }
    if (parts.length === 0) throw new Error('No VP8/VP8L chunk found in frame WebP');
    return concat(parts);
  }

  // ── VP8X chunk ─────────────────────────────────────────────────
  // Byte 0: flags — bit 1 = animation, bit 4 = alpha (stickers have alpha)
  // Bytes 1-3: reserved (0)
  // Bytes 4-6: canvas width  − 1 (24-bit LE)
  // Bytes 7-9: canvas height − 1 (24-bit LE)
  const vp8xFlags = (1 << 1) | (1 << 4); // animation | alpha
  const vp8xPayload = concat([
    new Uint8Array([vp8xFlags, 0, 0, 0]),
    u24(width  - 1),
    u24(height - 1),
  ]);
  const vp8xChunk = riffChunk('VP8X', vp8xPayload);

  // ── ANIM chunk ─────────────────────────────────────────────────
  // Bytes 0-3: background colour RGBA (0 = transparent)
  // Bytes 4-5: loop count (0 = infinite)
  const animPayload = concat([new Uint8Array(4), new Uint8Array(2)]);
  const animChunk   = riffChunk('ANIM', animPayload);

  // ── ANMF chunks ────────────────────────────────────────────────
  // Per frame:
  //   Bytes 0-2:  frame X / 2 (24-bit LE)
  //   Bytes 3-5:  frame Y / 2 (24-bit LE)
  //   Bytes 6-8:  frame width  − 1 (24-bit LE)
  //   Bytes 9-11: frame height − 1 (24-bit LE)
  //   Bytes 12-14: duration in ms (24-bit LE)
  //   Byte 15:    flags (bit 0 = no-blending, bit 1 = disposal)
  //   Bytes 16+:  frame bitstream (VP8/VP8L/VP8X chunks)
  const anmfChunks = frameWebPs.map(webpBytes => {
    const frameData  = extractFrameData(webpBytes);
    const anmfHeader = concat([
      u24(0),              // frame X / 2
      u24(0),              // frame Y / 2
      u24(width  - 1),
      u24(height - 1),
      u24(delayMs),
      new Uint8Array([0]), // flags: blend + no-disposal
    ]);
    return riffChunk('ANMF', concat([anmfHeader, frameData]));
  });

  // ── Final RIFF container ────────────────────────────────────────
  const webpBody = concat([vp8xChunk, animChunk, ...anmfChunks]);
  const riffBody = concat([enc.encode('WEBP'), webpBody]);
  return concat([enc.encode('RIFF'), u32(riffBody.length), riffBody]);
}

// ── Batch conversion ─────────────────────────────────────────────

window.convertAll = async function() {
  const statusEl  = document.getElementById('status-bar');
  const resultsEl = document.getElementById('results');

  const format    = document.querySelector('input[name="fmt"]:checked').value; // 'gif' | 'webp'
  const fps       = Math.max(1, parseInt(document.getElementById('opt-fps').value)     || 15);
  const width     = Math.max(16, parseInt(document.getElementById('opt-width').value)  || 512);
  const height    = Math.max(16, parseInt(document.getElementById('opt-height').value) || 512);
  const maxFrames = parseInt(document.getElementById('opt-max-frames').value) || null;
  const range     = parseRange(document.getElementById('opt-frames').value);

  document.getElementById('btn-convert').disabled = true;
  resultsEl.innerHTML = '';
  outputResults = [];

  if (format === 'gif') {
    setStatus(statusEl, 'busy', 'Initialising WASM…');
    try { await initWasm(); }
    catch(e) {
      setStatus(statusEl, 'failed', `WASM load failed: ${e.message}`);
      document.getElementById('btn-convert').disabled = false;
      return;
    }
  }

  let done = 0, failed = 0;

  for (const item of pendingFiles) {
    setStatus(statusEl, 'busy',
      `Converting ${done + failed + 1}/${pendingFiles.length}: ${item.name}`);

    const cardId = `res-${done + failed}`;
    const card = document.createElement('div');
    card.className = 'result-item pending';
    card.id = cardId;
    card.innerHTML = `
      <div class="result-icon">⏳</div>
      <div class="result-body" style="width:100%">
        <div class="result-name">${esc(item.name)}</div>
        <div class="result-sub">Rendering frames…</div>
        <div class="tgs-preview">
          <div class="progress-bar-wrap" style="width:100%;margin-top:.4rem">
            <div class="progress-bar-fill" id="prog-${cardId}" style="width:0%"></div>
          </div>
        </div>
      </div>`;
    resultsEl.appendChild(card);

    try {
      const bytes      = await readFileBytes(item.file);
      const lottieJson = (format === 'gif' ? wasm() : await initWasm()).tgs_decompress(bytes);
      const progEl     = document.getElementById(`prog-${cardId}`);

      const { frames, outputFps } = await sampleFrames(
        lottieJson, { fps, width, height, maxFrames, range }, progEl);

      let outBytes;
      if (format === 'gif') {
        outBytes = await encodeGif(frames, width, height, outputFps);
      } else {
        outBytes = await encodeWebP(frames, width, height, outputFps);
      }

      const outName = replaceExt(item.name, format);
      const mime    = format === 'gif' ? 'image/gif' : 'image/webp';
      outputResults.push({ name: outName, bytes: outBytes, mime });

      const previewUrl = URL.createObjectURL(new Blob([outBytes], { type: mime }));
      card.className = 'result-item success';
      card.innerHTML = `
        <div class="result-icon">✅</div>
        <div class="result-body">
          <div class="result-name">${esc(outName)}</div>
          <div class="result-sub">${fmtBytes(outBytes.length)} · ${width}×${height} · ${fps} fps · ${format.toUpperCase()}</div>
          <div class="tgs-preview" style="margin-top:.5rem">
            <img src="${previewUrl}" alt="preview" style="max-width:96px;border-radius:8px" />
          </div>
        </div>
        <div class="result-actions">
          <button class="btn btn-ghost" onclick="dlOne(${outputResults.length - 1})">⬇ Download</button>
        </div>`;
      done++;
    } catch(e) {
      card.className = 'result-item error';
      card.innerHTML = `
        <div class="result-icon">❌</div>
        <div class="result-body">
          <div class="result-name">${esc(item.name)}</div>
          <div class="result-sub">${esc(String(e))}</div>
        </div>`;
      failed++;
    }
  }

  const msg = failed
    ? `Done: ${done} converted, ${failed} failed`
    : `Done: ${done} file${done > 1 ? 's' : ''} converted`;
  setStatus(statusEl, failed ? 'failed' : 'done', msg);
  document.getElementById('btn-convert').disabled = false;
  if (outputResults.length > 1) document.getElementById('btn-dl-all').style.display = '';
};

window.dlOne = function(idx) {
  const r = outputResults[idx];
  if (r) downloadBytes(r.bytes, r.name, r.mime);
};
window.downloadAll = function() {
  outputResults.forEach(r => downloadBytes(r.bytes, r.name, r.mime));
};
window.clearAll = function() {
  pendingFiles = outputResults = [];
  document.getElementById('results').innerHTML = '';
  document.getElementById('btn-convert').disabled = true;
  document.getElementById('btn-dl-all').style.display = 'none';
  document.getElementById('input-files').value = '';
  document.getElementById('input-folder').value = '';
  if (activeZone) { resetDropZone(activeZone); activeZone = null; }
  setStatus(document.getElementById('status-bar'), 'idle', 'No files loaded');
};

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
